name: 'Terraform'

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read
  id-token: 'write'

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest


    defaults:
      run:
        shell: bash

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v3

    - id: auth
      uses: google-github-actions/auth@v2.0.0  
      with:
        workload_identity_provider: 'projects/1055995450970/locations/global/workloadIdentityPools/git-demo-pool/providers/github'
        service_account: 'github-wif@terraform-gcp-498312.iam.gserviceaccount.com'


          
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
        
    - name: Create state bucket if not exists
      run: |
       gsutil ls gs://bkt-tfstate-00-tans 2>/dev/null || \
       gsutil mb -p terraform-gcp-498312 -l europe-west3 gs://bkt-tfstate-00-tans
       gsutil versioning set on gs://bkt-tfstate-00-tans

    - name: Terraform Init
      run: terraform init


    # Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false


    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false

